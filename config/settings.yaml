config:
  account_check:
    detect_timeout_sec: 8.0
    enabled: false
    interval_minutes: 30
    on_abnormal: pause
  chat_ignore_names:
  - 收到的招呼
  - 互动通知
  - 订阅内容
  - 陌陌
  - 超级抢车位
  - 猜你喜欢
  - 谁看过我
  chat_list_scan_interval:
    max: 4.0
    min: 2.0
  chat_round_wait_s: 30.0
  chat_rounds_before_follow: 3
  chat_strategy: message_pool
  click_offset:
    x: 5
    y: 5
  delay:
    max: 0.8
    min: 0.3
  direct_group_mode: true
  greet_scan_interval_s: 5.0
  group_name: 交友
  huiguan_message_round: 3
  huiguan_enabled: false
  invite_back_message: 关注我一下吧，互关后拉你进群
  max_chat_rounds: 10
  max_consecutive_errors: 5
  message_pool_rotation:
    strategy: sequential
  message_pools:
  - id: 1
    messages:
    - 你好
  - id: 2
    messages:
    - 你也单身吗
  - id: 3
    messages:
    - 要不要出来我们试试
  - id: 4
    messages:
    - 你在哪呢
  - id: 5
    messages:
    - 今晚有空吗
  reply_interval:
    max: 3.0
    min: 1.0
  round_end_wait_s: 10.0
