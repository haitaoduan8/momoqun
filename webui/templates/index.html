<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>momoqun 控制台</title>
<style>
/* ============================== 基础重置 ============================== */
*{margin:0;padding:0;box-sizing:border-box}

/* ============================== 深色主题 + 渐变背景 ============================== */
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0c0e16 0%, #131624 40%, #1a1030 70%, #0c0e16 100%);
  background-attachment: fixed;
  color: #e0e0e0;
  min-height: 100vh;
}

/* 背景动效点缀 */
body::before{
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(245,158,11,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ============================== 导航栏 ============================== */
.nav{
  display: flex;
  gap: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(18,20,34,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav a{
  padding: 14px 24px;
  color: #888;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.25s ease;
  border-bottom: 2px solid transparent;
  position: relative;
}
.nav a:hover{
  color: #c0c0e0;
  background: rgba(99,102,241,0.06);
}
.nav a.active{
  color: #e8e8ff;
  border-bottom-color: #6366f1;
}

/* ============================== 主容器 — CSS Grid 两栏 ============================== */
.container{
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 20px;
  position: relative;
  z-index: 1;
}
.dashboard{
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 24px;
  align-items: start;
}

@media (max-width: 900px){
  .dashboard{
    grid-template-columns: 1fr;
  }
}

/* ============================== 玻璃态卡片 ============================== */
.card{
  background: rgba(22,25,50,0.55);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  transition: border-color 0.3s;
}
.card:hover{
  border-color: rgba(99,102,241,0.2);
}
.card-header{
  padding: 16px 20px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888bb0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-header .icon{ font-size: 16px; }

/* ============================== 控制栏 ============================== */
.toolbar{
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

/* ============================== 按钮 — 渐变色 + 悬停动画 ============================== */
.btn{
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.btn::after{
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}
.btn:hover::after{ opacity: 1; }
.btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.btn:active{ transform: translateY(0); }

.btn-primary{
  background: linear-gradient(135deg, #6366f1, #818cf8);
  color: #fff;
  box-shadow: 0 2px 12px rgba(99,102,241,0.3);
}
.btn-primary:hover{ box-shadow: 0 4px 20px rgba(99,102,241,0.45); }

.btn-success{
  background: linear-gradient(135deg, #10b981, #34d399);
  color: #fff;
  box-shadow: 0 2px 12px rgba(16,185,129,0.3);
}
.btn-success:hover{ box-shadow: 0 4px 20px rgba(16,185,129,0.45); }

.btn-danger{
  background: linear-gradient(135deg, #ef4444, #f87171);
  color: #fff;
  box-shadow: 0 2px 12px rgba(239,68,68,0.3);
}
.btn-danger:hover{ box-shadow: 0 4px 20px rgba(239,68,68,0.45); }

.btn-warning{
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  color: #1a1a2e;
  box-shadow: 0 2px 12px rgba(245,158,11,0.3);
}
.btn-warning:hover{ box-shadow: 0 4px 20px rgba(245,158,11,0.45); }

.btn-secondary{
  background: rgba(255,255,255,0.04);
  color: #a0a0c0;
  border: 1px solid rgba(255,255,255,0.08);
}
.btn-secondary:hover{
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15);
}
.btn-sm{ padding: 5px 10px; font-size: 11px; border-radius: 7px; }

/* ============================== 设备列表 ============================== */
.device-row{
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
  gap: 12px;
  transition: background 0.2s;
}
.device-row:last-child{ border-bottom: none; }
.device-row:hover{ background: rgba(255,255,255,0.02); }

.device-name{ min-width: 110px; font-weight: 600; font-size: 14px; }
.device-serial{ font-size: 11px; color: #555; min-width: 110px; font-family: 'SF Mono', 'Cascadia Code', monospace; }

.device-state{
  min-width: 84px;
  font-weight: 700;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  text-align: center;
}
.state-running{ color: #10b981; background: rgba(16,185,129,0.12); }
.state-paused{ color: #f59e0b; background: rgba(245,158,11,0.12); }
.state-stopped{ color: #666; background: rgba(255,255,255,0.04); }
.state-error{ color: #ef4444; background: rgba(239,68,68,0.12); }

.device-info{
  flex: 1;
  font-size: 11px;
  color: #777;
  min-width: 160px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.device-info span{ white-space: nowrap; }
.device-info .phase-badge{
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(99,102,241,0.15);
  color: #a5b4fc;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.device-actions{ display: flex; gap: 5px; }

/* ============================== 统计面板（右侧栏） ============================== */
.stats-section{ display: flex; flex-direction: column; gap: 16px; }

/* 本轮会话状态 */
.session-card{
  background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(16,185,129,0.06));
  border: 1px solid rgba(99,102,241,0.15);
}
.session-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px 20px;
}
.session-item{
  text-align: center;
  padding: 8px 4px;
}
.session-value{
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #818cf8, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.session-label{
  font-size: 11px;
  color: #777;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* 好友统计 */
.stat-row{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.stat-row:last-child{ border-bottom: none; }
.stat-row.total{ background: rgba(99,102,241,0.06); }
.stat-name{
  font-size: 13px;
  color: #aaa;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stat-dot{
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.stat-value{
  font-size: 16px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #e0e0e0;
}
.stat-row.total .stat-value{
  font-size: 22px;
  background: linear-gradient(135deg, #818cf8, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 状态颜色映射 */
.dot-pending{ background: #6b7280; }
.dot-accepted{ background: #6366f1; }
.dot-replied{ background: #10b981; }
.dot-mutual{ background: #06b6d4; }
.dot-pending_followback{ background: #8b5cf6; }
.dot-followed{ background: #f59e0b; }
.dot-done{ background: #22c55e; }
.dot-failed{ background: #ef4444; }

/* ============================== 空状态 ============================== */
.empty-state{
  padding: 48px 20px;
  text-align: center;
  color: #555;
  font-size: 14px;
}
.empty-state a{ color: #818cf8; text-decoration: none; }

/* 刷新指示器 */
.refresh-hint{
  font-size: 11px;
  color: #444;
  text-align: center;
  padding: 16px;
  margin-top: 8px;
}

/* ============================== 滚动条 ============================== */
::-webkit-scrollbar{ width: 6px; }
::-webkit-scrollbar-track{ background: transparent; }
::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,0.15); }

/* 脉冲动画 */
@keyframes pulse{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.5; } }
.live-dot{
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #10b981;
  display: inline-block;
  animation: pulse 2s infinite;
  margin-right: 6px;
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="active"><span style="margin-right:4px">📊</span>仪表盘</a>
  <a href="/config-page"><span style="margin-right:4px">⚙</span>配置</a>
  <a href="/devices"><span style="margin-right:4px">📱</span>设备</a>
</nav>

<div class="container">
<div class="dashboard">

  <!-- ========== 左栏：设备控制 + 设备列表 ========== -->
  <div>
    <div class="toolbar">
      <button class="btn btn-success" onclick="cmd('start_all')">▶ 全部启动</button>
      <button class="btn btn-danger" onclick="cmd('stop_all')">⏹ 全部停止</button>
      <button class="btn btn-warning" onclick="cmd('pause_all')">⏸ 全部暂停</button>
      <button class="btn btn-primary" onclick="cmd('resume_all')">▶ 全部恢复</button>
    </div>

    <div class="card" id="device-card">
      <div class="card-header"><span class="icon">📱</span>设备状态</div>
      <div id="device-list">加载中...</div>
    </div>
  </div>

  <!-- ========== 右栏：统计面板 ========== -->
  <div class="stats-section">

    <!-- 本轮会话状态 -->
    <div class="card session-card">
      <div class="card-header"><span class="icon">🔄</span>本轮会话</div>
      <div class="session-grid">
        <div class="session-item">
          <div class="session-value" id="s-round">0</div>
          <div class="session-label">当前轮次</div>
        </div>
        <div class="session-item">
          <div class="session-value" id="s-replied">0</div>
          <div class="session-label">本轮已回复</div>
        </div>
        <div class="session-item" style="grid-column: 1 / -1;">
          <div class="session-value" style="font-size: 22px;" id="s-new">0</div>
          <div class="session-label">本轮新通过好友（估算）</div>
        </div>
      </div>
    </div>

    <!-- 好友统计 -->
    <div class="card" id="stats-card">
      <div class="card-header"><span class="icon">👥</span>好友统计</div>
      <div id="stats-list">加载中...</div>
    </div>

  </div>

</div>

<div class="refresh-hint"><span class="live-dot"></span>每 1 秒自动刷新</div>
</div>

<script>
const API = '';

// ==================== 状态中文名映射 ====================
const STATUS_LABELS = {
  pending: '待处理',
  accepted: '已通过',
  replied: '已回复',
  mutual: '互关',
  pending_followback: '待回关',
  followed: '已关注',
  done: '已完成',
  failed: '失败',
  total: '总计',
};

const STATUS_DOT_CLASS = {
  pending: 'dot-pending',
  accepted: 'dot-accepted',
  replied: 'dot-replied',
  mutual: 'dot-mutual',
  pending_followback: 'dot-pending_followback',
  followed: 'dot-followed',
  done: 'dot-done',
  failed: 'dot-failed',
};

const STATUS_ORDER = ['total','accepted','replied','mutual','followed','pending_followback','pending','done','failed'];

// ==================== API 调用 ====================
async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function cmd(action, serial) {
  try {
    await fetchJSON(`${API}/api/devices/${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ serial: serial || '' }),
    });
    setTimeout(refreshAll, 300);
  } catch (e) { /* 静默失败，下次刷新会重试 */ }
}

// ==================== 刷新全部 ====================
async function refreshAll() {
  try {
    const [devices, stats] = await Promise.all([
      fetchJSON(`${API}/api/devices`),
      fetchJSON(`${API}/api/stats`).catch(() => null),
    ]);
    renderDevices(devices);
    renderSession(stats || {});
    renderStats(stats || {});
  } catch (e) {
    document.getElementById('device-list').innerHTML =
      '<div class="empty-state">无法连接服务器</div>';
  }
}

// ==================== 渲染设备列表 ====================
function renderDevices(devices) {
  const el = document.getElementById('device-list');
  if (!devices || !devices.length) {
    el.innerHTML = '<div class="empty-state">暂无设备，去 <a href="/devices">📱 设备</a> 页面添加</div>';
    return;
  }

  let html = '';
  for (const d of devices) {
    const sc = d.state === 'running' ? 'state-running' :
               d.state === 'paused' ? 'state-paused' :
               d.state === 'error' ? 'state-error' : 'state-stopped';
    const stateLabel = d.state === 'running' ? '🟢 运行中' :
                       d.state === 'paused' ? '🟡 已暂停' :
                       d.state === 'error' ? '🔴 错误' : '⚫ 已停止';

    const infoParts = [];
    if (d.round_number && d.round_number !== '0') infoParts.push('<span>轮次: ' + d.round_number + '</span>');
    if (d.friends_total && d.friends_total !== '0') infoParts.push('<span>好友: ' + d.friends_total + '</span>');
    if (d.friends_this_round && d.friends_this_round !== '0') infoParts.push('<span>本轮: ' + d.friends_this_round + '</span>');
    if (d.current_phase && d.current_phase !== 'idle') {
      const phaseLabels = { approve: '通过', reply: '回复', follow_mutual: '关注/互关', wait: '等待' };
      infoParts.push('<span class="phase-badge">' + (phaseLabels[d.current_phase] || d.current_phase) + '</span>');
    }
    if (d.error) infoParts.push('<span style="color:#f87171">⚠ ' + d.error + '</span>');
    const info = infoParts.join('') || '-';

    html += '<div class="device-row">' +
      '<div class="device-name">' + (d.name || d.serial) + '</div>' +
      '<div class="device-serial">' + d.serial + '</div>' +
      '<div class="device-state ' + sc + '">' + stateLabel + '</div>' +
      '<div class="device-info">' + info + '</div>' +
      '<div class="device-actions">' +
        '<button class="btn btn-success btn-sm" onclick="cmd(\'start\',\'' + d.serial + '\')">▶</button>' +
        '<button class="btn btn-danger btn-sm" onclick="cmd(\'stop\',\'' + d.serial + '\')">⏹</button>' +
        '<button class="btn btn-warning btn-sm" onclick="cmd(\'pause\',\'' + d.serial + '\')">⏸</button>' +
        '<button class="btn btn-primary btn-sm" onclick="cmd(\'resume\',\'' + d.serial + '\')">▶</button>' +
      '</div>' +
    '</div>';
  }

  el.innerHTML = html;
}

// ==================== 渲染本轮会话状态 ====================
function renderSession(stats) {
  const round = stats.round_number || stats.roundNumber || 0;
  const friendsThisRound = stats.friends_this_round || stats.friendsThisRound || 0;

  document.getElementById('s-round').textContent = round;
  document.getElementById('s-replied').textContent = friendsThisRound;

  // 本轮新通过好友：无独立字段，从 friends.accepted 推断
  const friends = stats.friends || {};
  const newApproved = friends.accepted || 0;
  document.getElementById('s-new').textContent = newApproved;
}

// ==================== 渲染好友统计 ====================
function renderStats(stats) {
  const el = document.getElementById('stats-list');
  const friends = stats.friends || {};

  // 如果后端没有数据，显示 mock
  if (!friends || Object.keys(friends).length === 0) {
    // 从设备快照中提取 friends_total
    el.innerHTML = '<div class="empty-state" style="padding:24px">暂无统计数据</div>';
    return;
  }

  let html = '';
  for (const key of STATUS_ORDER) {
    const count = friends[key];
    if (count === undefined) continue;
    const label = STATUS_LABELS[key] || key;
    const dotClass = STATUS_DOT_CLASS[key] || '';
    const rowClass = key === 'total' ? ' stat-row total' : 'stat-row';

    html += '<div class="' + rowClass + '">' +
      '<span class="stat-name"><span class="stat-dot ' + dotClass + '"></span>' + label + '</span>' +
      '<span class="stat-value">' + count + '</span>' +
    '</div>';
  }

  el.innerHTML = html || '<div class="empty-state" style="padding:24px">暂无统计数据</div>';
}

// ==================== 启动 ====================
refreshAll();
setInterval(refreshAll, 3000);
</script>
</body>
</html>
