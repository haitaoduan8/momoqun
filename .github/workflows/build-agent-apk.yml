name: Build Agent APK

on:
  push:
    paths:
      - "agent-android/**"
  pull_request:
    paths:
      - "agent-android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        working-directory: agent-android
        run: |
          # gradle-wrapper.properties 已有，生成 wrapper 脚本
          gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        working-directory: agent-android
        run: ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: agent-android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-debug-apk
          path: agent-android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-apk
          path: agent-android/app/build/outputs/apk/release/app-release-unsigned.apk
