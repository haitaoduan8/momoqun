name: Build Agent APK

on:
  push:
    paths:
      - "agent-android/**"
      - ".github/workflows/build-agent-apk.yml"
  pull_request:
    paths:
      - "agent-android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Generate Gradle Wrapper
        working-directory: agent-android
        run: gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        working-directory: agent-android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: agent-android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-debug-apk
          path: agent-android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-apk
          path: agent-android/app/build/outputs/apk/release/app-release-unsigned.apk
