name: Build Windows EXE

on:
  push:
    branches: [main]
    paths-ignore:
      - "agent-android/**"
      - "webui/**"
      - "*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build EXE
        run: pyinstaller momoqun.spec

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: momoqun-windows
          path: dist/momoqun/
