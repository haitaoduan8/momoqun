name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller fastapi uvicorn pyyaml

      - name: Build EXE with PyInstaller
        run: pyinstaller momoqun.spec

      - name: Zip dist output
        run: Compress-Archive -Path dist/momoqun/* -DestinationPath momoqun-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: momoqun-windows
          path: momoqun-windows.zip
          retention-days: 7
