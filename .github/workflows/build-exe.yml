name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller momoqun.spec

      - name: Package EXE as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist\momoqun\* -DestinationPath momoqun-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: momoqun-Windows
          path: momoqun-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: momoqun-Windows-latest
          tag_name: latest
          files: momoqun-Windows.zip
          prerelease: false
          body: |
            ## momoqun Windows EXE

            自动构建于 ${{ github.sha }}。

            ### 使用方法
            1. 下载 `momoqun-Windows.zip`
            2. 解压到任意目录
            3. 运行 `momoqun.exe`
            4. 手机通过 USB 连接电脑，开启 USB 调试
            5. 浏览器打开 `http://localhost:8550` 进入管理界面
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
